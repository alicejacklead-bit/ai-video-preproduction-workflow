<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workflow Analytics Panel</title>
    <style>
      :root {
        --bg: #f5efe6;
        --surface: rgba(255, 250, 244, 0.9);
        --surface-strong: #fffaf4;
        --text: #1f2621;
        --muted: #69736c;
        --line: rgba(31, 38, 33, 0.1);
        --primary: #27604f;
        --primary-soft: rgba(39, 96, 79, 0.12);
        --accent: #c96b33;
        --accent-soft: rgba(201, 107, 51, 0.12);
        --danger: #b84d58;
        --danger-soft: rgba(184, 77, 88, 0.12);
        --gold: #d4aa46;
        --shadow: 0 24px 60px rgba(80, 57, 36, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(201, 107, 51, 0.18), transparent 24%),
          radial-gradient(circle at right 20%, rgba(39, 96, 79, 0.14), transparent 22%),
          linear-gradient(180deg, #f8f2e9 0%, #efe7da 100%);
      }

      .page {
        max-width: 1480px;
        margin: 0 auto;
        padding: 28px 20px 60px;
      }

      .hero {
        margin-bottom: 18px;
      }

      .card {
        background: var(--surface);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .hero-main,
      .panel {
        padding: 24px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--primary-soft);
        color: var(--primary);
        font-size: 13px;
        font-weight: 700;
      }

      h1 {
        margin: 14px 0 10px;
        font-size: clamp(36px, 5vw, 58px);
        line-height: 0.96;
        letter-spacing: -0.05em;
      }

      .subhead,
      .panel-note,
      .muted {
        color: var(--muted);
      }

      .subhead {
        margin: 0;
        max-width: 58ch;
        font-size: 16px;
        line-height: 1.6;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 18px;
      }

      .metric {
        padding: 20px;
      }

      .metric-label {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .metric-value {
        font-size: clamp(32px, 4vw, 44px);
        line-height: 1;
        letter-spacing: -0.05em;
        margin-bottom: 10px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .pill.up {
        background: var(--primary-soft);
        color: var(--primary);
      }

      .pill.warn {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .stack {
        display: grid;
        gap: 18px;
      }

      .panel-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .panel-title {
        font-size: 21px;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 16px;
      }

      .chart-shell {
        padding: 10px 0 4px;
      }

      .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        font-size: 13px;
      }

      .total-chart {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 12px;
        align-items: end;
        height: 240px;
      }

      .bar-col {
        display: grid;
        gap: 8px;
        align-items: end;
      }

      .bar-label,
      .day-label {
        text-align: center;
        font-size: 12px;
      }

      .bar-label {
        color: var(--muted);
      }

      .day-label {
        color: var(--muted);
      }

      .bar-track {
        height: 180px;
        display: flex;
        align-items: end;
      }

      .bar {
        width: 100%;
        border-radius: 18px 18px 8px 8px;
        background: linear-gradient(180deg, #da8e62 0%, #c96b33 100%);
        min-height: 12px;
      }

      .bar.green {
        background: linear-gradient(180deg, #73a58d 0%, #27604f 100%);
      }

      .leaderboard {
        display: grid;
        gap: 12px;
      }

      .workflow-row {
        padding: 14px 14px 12px;
        border-radius: 18px;
        background: var(--surface-strong);
        border: 1px solid var(--line);
      }

      .workflow-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: baseline;
      }

      .workflow-name {
        font-weight: 700;
      }

      .workflow-meta {
        color: var(--muted);
        font-size: 13px;
      }

      .track {
        height: 10px;
        background: rgba(31, 38, 33, 0.08);
        border-radius: 999px;
        overflow: hidden;
        margin-top: 10px;
      }

      .fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #27604f 0%, #4b8f7a 100%);
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .select {
        appearance: none;
        border: 1px solid var(--line);
        background: var(--surface-strong);
        color: var(--text);
        border-radius: 14px;
        padding: 12px 14px;
        font: inherit;
        min-width: 260px;
      }

      .focus-grid {
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 16px;
      }

      .line-card {
        background: var(--surface-strong);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 16px;
      }

      .line-chart {
        position: relative;
        height: 260px;
        padding: 8px 0 34px;
      }

      .grid-lines {
        position: absolute;
        inset: 0 0 34px 0;
        display: grid;
        grid-template-rows: repeat(5, 1fr);
      }

      .grid-lines span {
        border-top: 1px dashed rgba(31, 38, 33, 0.12);
      }

      .polyline {
        position: absolute;
        inset: 0 0 34px 0;
        width: 100%;
        height: calc(100% - 34px);
      }

      .points {
        position: absolute;
        inset: 0 0 34px 0;
      }

      .point {
        position: absolute;
        width: 14px;
        height: 14px;
        margin-left: -7px;
        margin-top: -7px;
        border-radius: 999px;
        background: #fff;
        border: 4px solid var(--primary);
        box-shadow: 0 0 0 4px rgba(39, 96, 79, 0.12);
      }

      .x-axis {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 8px;
      }

      .x-axis span {
        text-align: center;
        color: var(--muted);
        font-size: 12px;
      }

      .line-stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 14px;
      }

      .mini-stat {
        padding: 14px;
        border-radius: 16px;
        background: rgba(39, 96, 79, 0.06);
      }

      .mini-stat .num {
        font-size: 28px;
        line-height: 1;
        letter-spacing: -0.04em;
        margin-top: 4px;
      }

      .version-list,
      .event-list {
        display: grid;
        gap: 10px;
      }

      .version-row,
      .event-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid var(--line);
      }

      .version-row:last-child,
      .event-row:last-child {
        border-bottom: 0;
      }

      .event-type {
        display: inline-flex;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .event-start {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .event-complete {
        background: var(--primary-soft);
        color: var(--primary);
      }

      .event-error {
        background: var(--danger-soft);
        color: var(--danger);
      }

      @media (max-width: 1120px) {
        .summary-grid,
        .focus-grid {
          grid-template-columns: 1fr;
        }

        .metrics {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 680px) {
        .page {
          padding: 16px 12px 40px;
        }

        .metrics,
        .line-stats {
          grid-template-columns: 1fr;
        }

        .total-chart {
          gap: 8px;
        }

        .hero-main,
        .panel {
          padding: 18px;
        }

        .select {
          width: 100%;
          min-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="card hero-main">
          <div class="badge">Private Analytics Dashboard</div>
          <h1>总使用一眼看清，单个工作流逐日追踪</h1>
          <p class="subhead">整体总览在上，单个工作流单日趋势在下。</p>
        </div>
      </section>

      <section class="metrics">
        <article class="card metric">
          <div class="metric-label">全部工作流总调用</div>
          <div class="metric-value" id="metric-total-runs">0</div>
          <span class="pill up" id="metric-total-delta">+0 本周</span>
        </article>
        <article class="card metric">
          <div class="metric-label">近 7 天活跃工作流</div>
          <div class="metric-value" id="metric-active-workflows">0</div>
          <span class="pill up">有真实运行记录</span>
        </article>
        <article class="card metric">
          <div class="metric-label">整体完成率</div>
          <div class="metric-value" id="metric-completion">0%</div>
          <span class="pill warn" id="metric-error">错误率 0%</span>
        </article>
        <article class="card metric">
          <div class="metric-label">今日全部调用</div>
          <div class="metric-value" id="metric-today">0</div>
          <span class="pill up">最近 24 小时</span>
        </article>
      </section>

      <section class="stack">
        <article class="card panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">整体使用趋势</div>
            </div>
            <div class="muted">最近 7 天</div>
          </div>
          <div class="summary-grid">
            <div class="chart-shell">
              <div class="chart-header">
                <span class="muted">每日总调用</span>
                <strong id="peak-day-text">峰值日</strong>
              </div>
              <div class="total-chart" id="total-chart"></div>
            </div>
            <div>
              <div class="panel-title" style="font-size: 18px; margin-bottom: 12px">工作流排行榜</div>
              <div class="leaderboard" id="leaderboard"></div>
            </div>
          </div>
        </article>

        <article class="card panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">单个工作流单日使用情况</div>
            </div>
            <div class="controls">
              <label class="muted" for="workflow-select">选择工作流</label>
              <select class="select" id="workflow-select"></select>
            </div>
          </div>

          <div class="focus-grid">
            <div class="line-card">
              <div class="chart-header">
                <strong id="focus-name">-</strong>
                <span class="muted" id="focus-caption">近 7 天单日调用量</span>
              </div>
              <div class="line-chart">
                <div class="grid-lines">
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                </div>
                <svg class="polyline" viewBox="0 0 100 100" preserveAspectRatio="none">
                  <polyline id="focus-polyline" fill="none" stroke="#27604f" stroke-width="3" points=""></polyline>
                </svg>
                <div class="points" id="focus-points"></div>
                <div class="x-axis" id="focus-axis"></div>
              </div>
              <div class="line-stats">
                <div class="mini-stat">
                  <div class="muted">近 7 天总调用</div>
                  <div class="num" id="focus-total">0</div>
                </div>
                <div class="mini-stat">
                  <div class="muted">最高单日</div>
                  <div class="num" id="focus-max">0</div>
                </div>
                <div class="mini-stat">
                  <div class="muted">今日调用</div>
                  <div class="num" id="focus-today">0</div>
                </div>
              </div>
            </div>

            <div class="stack">
              <div class="card panel" style="padding: 18px">
                <div class="panel-head" style="margin-bottom: 10px">
                  <div>
                    <div class="panel-title" style="font-size: 18px">版本采用情况</div>
                  </div>
                </div>
                <div class="version-list" id="version-list"></div>
              </div>

              <div class="card panel" style="padding: 18px">
                <div class="panel-head" style="margin-bottom: 10px">
                  <div>
                    <div class="panel-title" style="font-size: 18px">最近事件</div>
                  </div>
                </div>
                <div class="event-list" id="event-list"></div>
              </div>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script>
      const weeklyLabels = ["06/19", "06/20", "06/21", "06/22", "06/23", "06/24", "06/25"];

      const workflows = [
        {
          id: "ai-video-preproduction-workflow",
          name: "AI Video Preproduction",
          totalRuns: 46,
          completionRate: 67,
          dailyRuns: [4, 7, 5, 6, 8, 10, 6],
          versions: [
            { name: "v1.3.0", share: 54 },
            { name: "v1.2.4", share: 29 },
            { name: "v1.2.3", share: 17 }
          ],
          events: [
            { time: "06/25 14:32", version: "v1.3.0", type: "start" },
            { time: "06/25 14:35", version: "v1.3.0", type: "complete" },
            { time: "06/25 11:08", version: "v1.2.4", type: "error" },
            { time: "06/24 22:16", version: "v1.2.4", type: "complete" }
          ]
        },
        {
          id: "storyboard-builder",
          name: "Storyboard Builder",
          totalRuns: 31,
          completionRate: 58,
          dailyRuns: [2, 4, 3, 5, 7, 6, 4],
          versions: [
            { name: "v0.9.2", share: 61 },
            { name: "v0.9.1", share: 24 },
            { name: "v0.8.8", share: 15 }
          ],
          events: [
            { time: "06/25 12:04", version: "v0.9.2", type: "start" },
            { time: "06/25 12:12", version: "v0.9.2", type: "complete" },
            { time: "06/24 19:48", version: "v0.9.1", type: "error" },
            { time: "06/24 18:25", version: "v0.9.2", type: "complete" }
          ]
        },
        {
          id: "character-board-generator",
          name: "Character Board Generator",
          totalRuns: 28,
          completionRate: 71,
          dailyRuns: [1, 3, 2, 4, 5, 7, 6],
          versions: [
            { name: "v2.0.1", share: 72 },
            { name: "v2.0.0", share: 18 },
            { name: "v1.9.7", share: 10 }
          ],
          events: [
            { time: "06/25 15:08", version: "v2.0.1", type: "complete" },
            { time: "06/25 14:52", version: "v2.0.1", type: "start" },
            { time: "06/24 20:41", version: "v2.0.0", type: "complete" },
            { time: "06/23 10:19", version: "v1.9.7", type: "error" }
          ]
        },
        {
          id: "packaging-board-exporter",
          name: "Packaging Board Exporter",
          totalRuns: 23,
          completionRate: 52,
          dailyRuns: [0, 1, 2, 3, 4, 8, 5],
          versions: [
            { name: "v1.0.5", share: 48 },
            { name: "v1.0.4", share: 31 },
            { name: "v1.0.2", share: 21 }
          ],
          events: [
            { time: "06/25 09:31", version: "v1.0.5", type: "complete" },
            { time: "06/24 22:01", version: "v1.0.5", type: "start" },
            { time: "06/24 21:47", version: "v1.0.4", type: "error" },
            { time: "06/23 17:22", version: "v1.0.2", type: "complete" }
          ]
        }
      ];

      const aggregateDailyRuns = weeklyLabels.map((_, index) =>
        workflows.reduce((sum, workflow) => sum + workflow.dailyRuns[index], 0)
      );

      const totalRuns = workflows.reduce((sum, workflow) => sum + workflow.totalRuns, 0);
      const totalToday = workflows.reduce((sum, workflow) => sum + workflow.dailyRuns[workflow.dailyRuns.length - 1], 0);
      const avgCompletion = Math.round(
        workflows.reduce((sum, workflow) => sum + workflow.completionRate, 0) / workflows.length
      );
      const approxErrorRate = 100 - avgCompletion;
      const peakDayValue = Math.max(...aggregateDailyRuns);
      const peakDayIndex = aggregateDailyRuns.findIndex((value) => value === peakDayValue);

      function renderTopMetrics() {
        document.getElementById("metric-total-runs").textContent = totalRuns;
        document.getElementById("metric-total-delta").textContent = `+${aggregateDailyRuns[6] - aggregateDailyRuns[0]} 近 7 天净增`;
        document.getElementById("metric-active-workflows").textContent = workflows.length;
        document.getElementById("metric-completion").textContent = `${avgCompletion}%`;
        document.getElementById("metric-error").textContent = `错误率 ${approxErrorRate}%`;
        document.getElementById("metric-today").textContent = totalToday;
        document.getElementById("peak-day-text").textContent = `${weeklyLabels[peakDayIndex]} 峰值 ${peakDayValue}`;
      }

      function renderTotalChart() {
        const maxValue = Math.max(...aggregateDailyRuns);
        const chart = document.getElementById("total-chart");
        chart.innerHTML = "";

        aggregateDailyRuns.forEach((value, index) => {
          const col = document.createElement("div");
          col.className = "bar-col";
          const isPeak = value === maxValue;
          const height = Math.max(12, Math.round((value / maxValue) * 100));

          col.innerHTML = `
            <div class="bar-label">${value}</div>
            <div class="bar-track">
              <div class="bar ${isPeak ? "green" : ""}" style="height:${height}%"></div>
            </div>
            <div class="day-label">${weeklyLabels[index]}</div>
          `;
          chart.appendChild(col);
        });
      }

      function renderLeaderboard() {
        const maxRuns = Math.max(...workflows.map((item) => item.totalRuns));
        const board = document.getElementById("leaderboard");
        board.innerHTML = "";

        workflows
          .slice()
          .sort((a, b) => b.totalRuns - a.totalRuns)
          .forEach((workflow) => {
            const row = document.createElement("div");
            row.className = "workflow-row";
            row.innerHTML = `
              <div class="workflow-top">
                <div>
                  <div class="workflow-name">${workflow.name}</div>
                  <div class="workflow-meta">总调用 ${workflow.totalRuns} 次</div>
                </div>
                <strong>${workflow.completionRate}% 完成率</strong>
              </div>
              <div class="track">
                <div class="fill" style="width:${Math.round((workflow.totalRuns / maxRuns) * 100)}%"></div>
              </div>
            `;
            board.appendChild(row);
          });
      }

      function populateSelect() {
        const select = document.getElementById("workflow-select");
        workflows.forEach((workflow) => {
          const option = document.createElement("option");
          option.value = workflow.id;
          option.textContent = workflow.name;
          select.appendChild(option);
        });
      }

      function renderFocus(workflowId) {
        const workflow = workflows.find((item) => item.id === workflowId) || workflows[0];
        const maxValue = Math.max(...workflow.dailyRuns, 1);
        const total = workflow.dailyRuns.reduce((sum, value) => sum + value, 0);
        const today = workflow.dailyRuns[workflow.dailyRuns.length - 1];
        const maxDay = Math.max(...workflow.dailyRuns);

        document.getElementById("focus-name").textContent = workflow.name;
        document.getElementById("focus-caption").textContent = `${workflow.id} 的近 7 天单日调用量`;
        document.getElementById("focus-total").textContent = total;
        document.getElementById("focus-max").textContent = maxDay;
        document.getElementById("focus-today").textContent = today;

        const points = workflow.dailyRuns.map((value, index) => {
          const x = (index / (workflow.dailyRuns.length - 1)) * 100;
          const y = 100 - (value / maxValue) * 82 - 8;
          return `${x},${y}`;
        });
        document.getElementById("focus-polyline").setAttribute("points", points.join(" "));

        const pointsLayer = document.getElementById("focus-points");
        pointsLayer.innerHTML = "";
        workflow.dailyRuns.forEach((value, index) => {
          const dot = document.createElement("div");
          dot.className = "point";
          dot.style.left = `${(index / (workflow.dailyRuns.length - 1)) * 100}%`;
          dot.style.top = `${100 - (value / maxValue) * 82 - 8}%`;
          dot.title = `${weeklyLabels[index]}: ${value}`;
          pointsLayer.appendChild(dot);
        });

        const axis = document.getElementById("focus-axis");
        axis.innerHTML = "";
        weeklyLabels.forEach((label) => {
          const node = document.createElement("span");
          node.textContent = label;
          axis.appendChild(node);
        });

        const versionList = document.getElementById("version-list");
        versionList.innerHTML = "";
        workflow.versions.forEach((version) => {
          const row = document.createElement("div");
          row.className = "version-row";
          row.innerHTML = `<span>${version.name}</span><strong>${version.share}%</strong>`;
          versionList.appendChild(row);
        });

        const eventList = document.getElementById("event-list");
        eventList.innerHTML = "";
        workflow.events.forEach((event) => {
          const row = document.createElement("div");
          row.className = "event-row";
          row.innerHTML = `
            <div>
              <div><strong>${event.time}</strong></div>
              <div class="muted">${event.version}</div>
            </div>
            <span class="event-type event-${event.type}">${event.type}</span>
          `;
          eventList.appendChild(row);
        });
      }

      renderTopMetrics();
      renderTotalChart();
      renderLeaderboard();
      populateSelect();
      renderFocus(workflows[0].id);

      document.getElementById("workflow-select").addEventListener("change", (event) => {
        renderFocus(event.target.value);
      });
    </script>
  </body>
</html>
